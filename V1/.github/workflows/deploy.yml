name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ["main"] # 如果你的主分支叫 master，請改為 master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: ./web-app  # 指定在 web-app 資料夾下執行
        run: npm install
      - name: Build
        working-directory: ./web-app  # 指定在 web-app 資料夾下執行
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web-app/dist' # 部署打包後的 dist 資料夾
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4